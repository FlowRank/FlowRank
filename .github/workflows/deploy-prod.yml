name: docker

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

concurrency:
  group: ${{ github.event_name == 'pull_request' && format('pr-{0}', github.event.pull_request.number) || 'deploy-main' }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      actions: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Login to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build with Bake from compose.prod.yaml
        uses: docker/bake-action@v6
        with:
          files: |
            ./compose.prod.yaml
          targets: frontend,backend
          pull: true
          push: ${{ github.event_name != 'pull_request' }}
          set: |
            *.cache-from=type=gha
            *.cache-to=type=gha,mode=max
        env:
          IMAGE_TAG: ${{ github.event_name == 'pull_request' && format('pr-{0}-sha-{1}', github.event.pull_request.number, github.sha) || format('sha-{0}', github.sha) }}

      - name: Tag main on GHCR (même digest que sha)
        if: github.event_name != 'pull_request'
        run: |
          docker buildx imagetools create -t ghcr.io/flowrank/flowrank-backend:latest "ghcr.io/flowrank/flowrank-backend:sha-${{ github.sha }}"
          docker buildx imagetools create -t ghcr.io/flowrank/flowrank-frontend:latest "ghcr.io/flowrank/flowrank-frontend:sha-${{ github.sha }}"

  deploy:
    needs: build
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Start SSH agent
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.PROD_SSH_KEY }}

      - name: Add server to known_hosts
        run: |
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          echo "${{ secrets.PROD_SSH_KNOWN_HOSTS }}" >> ~/.ssh/known_hosts
          chmod 600 ~/.ssh/known_hosts

      - name: Deploy (git sync + pull images + compose up)
        env:
          PROD_HOST: ${{ secrets.PROD_HOST }}
          PROD_PORT: ${{ secrets.PROD_PORT }}
          PROD_USER: ${{ secrets.PROD_USER }}
        run: |
          ssh -p "$PROD_PORT" "$PROD_USER@$PROD_HOST" 'bash -lc "
            set -euo pipefail

            cd ~/FlowRank

            git fetch --all --prune
            git reset --hard origin/main

            docker compose -f compose.prod.yaml pull
            docker compose -f compose.prod.yaml up -d
            docker image prune -f
          "'
