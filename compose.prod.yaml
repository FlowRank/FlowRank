name: prod-flowrank
services:
  frontend:
    image: ghcr.io/flowrank/flowrank-frontend:${IMAGE_TAG:-latest}
    build:
      context: ./front
      target: production
    restart: unless-stopped
    ports:
      - 80:80
    depends_on:
      - backend

  backend:
    image: ghcr.io/flowrank/flowrank-backend:${IMAGE_TAG:-latest}
    build:
      context: ./back
      target: production
    env_file:
      - .env
    restart: unless-stopped

    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/"]
      start_period: 30s
      interval: 30s
      timeout: 5s
      retries: 3
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - 5001:5000

  postgres:
    image: postgres:17-alpine
    env_file:
      - .env
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      start_period: 10s
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    volumes:
      - database:/var/lib/postgresql/data

volumes:
  database:
